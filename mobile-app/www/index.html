<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0f1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>NOCO AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #0a0f1a;
      --teal: #59e0d1;
      --lavender: #ada0ff;
      --mint: #73f2bf;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.14);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "Segoe UI", sans-serif;
      background: var(--midnight);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      animation: drift 9s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 260px; height: 260px;
      background: rgba(89, 224, 209, 0.22);
      top: -80px; left: -60px;
    }

    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(173, 160, 255, 0.18);
      bottom: -100px; right: -80px;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 180px; height: 180px;
      background: rgba(115, 242, 191, 0.12);
      top: 40%; left: 55%;
      animation-delay: -5s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(24px, -18px) scale(1.06); }
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: calc(16px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(-12px);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--glass-border);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.75);
    }

    .version {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      color: var(--teal);
      opacity: 0.85;
    }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 32px 28px;
      border-radius: 32px;
      background: var(--glass);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35), 0 0 40px rgba(89,224,209,0.08);
      position: relative;
      text-align: center;
      opacity: 0;
      transform: scale(0.94);
      animation: pop 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(89,224,209,0.25), rgba(255,255,255,0.08));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff73a5, #8c7bff, #59e0d1);
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 900;
      color: rgba(0,0,0,0.75);
      box-shadow: 0 12px 28px rgba(140,123,255,0.35);
      animation: shimmer 2.4s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { filter: brightness(1); }
      to   { filter: brightness(1.15); }
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.9);
    }

    h1 {
      font-size: clamp(26px, 6vw, 30px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 10px;
      animation: glow 2.8s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 8px rgba(89,224,209,0.15); }
      to   { text-shadow: 0 0 22px rgba(89,224,209,0.45); }
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    .dot.active {
      width: 8px;
      height: 8px;
      background: var(--teal);
      box-shadow: 0 0 10px rgba(89,224,209,0.6);
    }

    .bottom {
      display: flex;
      justify-content: center;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .cta {
      padding: 12px 32px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), var(--lavender));
      color: rgba(0,0,0,0.8);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 28px rgba(140,123,255,0.35);
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app">
    <header class="topbar">
      <span class="pill">NOCO-OS</span>
      <span class="version">1.0</span>
    </header>

    <section class="center">
      <div class="card">
        <div class="logo-wrap">
          <div class="logo-icon">NO</div>
          <div class="logo-text">NOCO</div>
        </div>
        <h1>Herzlich willkommen</h1>
        <p class="subtitle">NOCO System · AI</p>
        <div class="dots" aria-hidden="true">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </section>

    <footer class="bottom">
      <button class="cta" type="button" tabindex="-1">Bereit</button>
    </footer>
  </main>
</body>
</html>
