name: Build NOCO TimePay IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          set -e
          xcodebuild clean build \
            -project TimePay.xcodeproj \
            -scheme TimePay \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_STYLE=Manual

          APP_PATH=$(find build/DerivedData -name "TimePay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "TimePay.app not found"
            find build -type d
            exit 1
          fi

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/TimePay.app
          cd build && zip -rq NOCO-TIMEPAY.ipa Payload
          ls -la NOCO-TIMEPAY.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NOCO-TIMEPAY-ipa
          path: build/NOCO-TIMEPAY.ipa
          retention-days: 90
