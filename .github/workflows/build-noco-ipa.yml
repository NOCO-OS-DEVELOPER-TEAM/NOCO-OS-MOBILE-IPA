name: Build NOCO TimePay IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p build

          xcodebuild clean build \
            -project TimePay.xcodeproj \
            -scheme TimePay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_STYLE=Manual \
            VALIDATE_PRODUCT=NO \
            2>&1 | tee build/xcodebuild.log

          APP_PATH=$(find build/DerivedData -name "TimePay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "TimePay.app not found"
            tail -100 build/xcodebuild.log
            find build -type d
            exit 1
          fi

          echo "=== PlugIns before sign ==="
          ls -la "$APP_PATH/PlugIns/" || { echo "No PlugIns folder"; exit 1; }

          sign_bundle() {
            codesign --force --sign - --entitlements "$2" "$1"
          }

          sign_bundle "$APP_PATH/PlugIns/TimePayShieldConfiguration.appex" Extensions/TimePayShieldConfiguration/TimePayShieldConfiguration.entitlements
          sign_bundle "$APP_PATH/PlugIns/TimePayShieldAction.appex" Extensions/TimePayShieldAction/TimePayShieldAction.entitlements
          sign_bundle "$APP_PATH/PlugIns/TimePayMonitor.appex" Extensions/TimePayMonitor/TimePayMonitor.entitlements
          sign_bundle "$APP_PATH" TimePay/TimePay.entitlements

          echo "=== Entitlements embedded ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null | head -30 || true

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/TimePay.app
          cd build && zip -rq NOCO-TIMEPAY.ipa Payload
          ls -la NOCO-TIMEPAY.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          retention-days: 7

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NOCO-TIMEPAY-ipa
          path: build/NOCO-TIMEPAY.ipa
          retention-days: 90
