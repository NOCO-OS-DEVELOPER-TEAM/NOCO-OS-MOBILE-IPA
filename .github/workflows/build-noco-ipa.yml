name: Build NOCO TimePay IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p build

          xcodebuild clean build \
            -project TimePay.xcodeproj \
            -scheme TimePay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_STYLE=Manual \
            VALIDATE_PRODUCT=NO \
            VALIDATE_EMBEDDED_BINARY_BUNDLE_IDENTIFIER=NO \
            2>&1 | tee build/xcodebuild.log

          if ! grep -q "BUILD SUCCEEDED" build/xcodebuild.log; then
            echo "=== xcodebuild failed ==="
            grep -E "error:|fatal error:|BUILD FAILED" build/xcodebuild.log | tail -40 || tail -80 build/xcodebuild.log
            exit 1
          fi

          APP_PATH=$(find build/DerivedData -name "TimePay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "TimePay.app not found"
            tail -100 build/xcodebuild.log
            exit 1
          fi

          echo "=== PlugIns ==="
          ls -la "$APP_PATH/PlugIns/"

          # Entitlements for SideStore re-sign (not applied during unsigned xcodebuild)
          cp TimePay/TimePay.entitlements "$APP_PATH/TimePay.entitlements"
          cp Extensions/TimePayShieldConfiguration/TimePayShieldConfiguration.entitlements \
            "$APP_PATH/PlugIns/TimePayShieldConfiguration.appex/TimePayShieldConfiguration.entitlements"
          cp Extensions/TimePayShieldAction/TimePayShieldAction.entitlements \
            "$APP_PATH/PlugIns/TimePayShieldAction.appex/TimePayShieldAction.entitlements"
          cp Extensions/TimePayMonitor/TimePayMonitor.entitlements \
            "$APP_PATH/PlugIns/TimePayMonitor.appex/TimePayMonitor.entitlements"
          if [ -d "$APP_PATH/PlugIns/TimePayWidgets.appex" ]; then
            cp Extensions/TimePayWidgets/TimePayWidgets.entitlements \
              "$APP_PATH/PlugIns/TimePayWidgets.appex/TimePayWidgets.entitlements"
          fi

          # Ad-hoc sign binaries (no restricted entitlements in signature)
          set +e
          for APPEX in "$APP_PATH/PlugIns/"*.appex; do
            codesign --force --sign - --timestamp=none "$APPEX"
          done
          codesign --force --sign - --timestamp=none "$APP_PATH"
          set -e

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/TimePay.app
          mkdir -p build/sidestore-entitlements
          cp TimePay/TimePay.entitlements build/sidestore-entitlements/TimePay.plist
          cp Extensions/TimePayShieldConfiguration/TimePayShieldConfiguration.entitlements \
            build/sidestore-entitlements/TimePayShieldConfiguration.plist
          cp Extensions/TimePayShieldAction/TimePayShieldAction.entitlements \
            build/sidestore-entitlements/TimePayShieldAction.plist
          cp Extensions/TimePayMonitor/TimePayMonitor.entitlements \
            build/sidestore-entitlements/TimePayMonitor.plist
          if [ -f Extensions/TimePayWidgets/TimePayWidgets.entitlements ]; then
            cp Extensions/TimePayWidgets/TimePayWidgets.entitlements \
              build/sidestore-entitlements/TimePayWidgets.plist
          fi
          cd build && zip -rq NOCO-TIMEPAY.ipa Payload sidestore-entitlements
          ls -la NOCO-TIMEPAY.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          retention-days: 7

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NOCO-TIMEPAY-ipa
          path: build/NOCO-TIMEPAY.ipa
          retention-days: 90
