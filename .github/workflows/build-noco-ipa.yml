name: Build NOCO TimePay IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    concurrency:
      group: build-noco-ipa-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        shell: bash
        run: |
          set -eo pipefail
          mkdir -p build

          xcodebuild clean build \
            -project TimePay.xcodeproj \
            -scheme TimePay \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_STYLE=Manual \
            VALIDATE_PRODUCT=NO \
            2>&1 | tee build/xcodebuild.log

          if ! grep -q "BUILD SUCCEEDED" build/xcodebuild.log; then
            echo "=== xcodebuild failed ==="
            grep -E "error:|fatal error:|BUILD FAILED" build/xcodebuild.log | tail -40 || tail -80 build/xcodebuild.log
            exit 1
          fi

          APP_PATH=$(find build/DerivedData -name "TimePay.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "TimePay.app not found"
            tail -100 build/xcodebuild.log
            exit 1
          fi

          cp LiveCash/LiveCash.entitlements "$APP_PATH/LiveCash.entitlements"

          codesign --force --sign - --timestamp=none "$APP_PATH"

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/TimePay.app
          mkdir -p build/sidestore-entitlements
          cp LiveCash/LiveCash.entitlements build/sidestore-entitlements/TimePay.plist
          cp sidestore-entitlements/ANLEITUNG.txt build/sidestore-entitlements/ANLEITUNG.txt
          cd build && zip -rq NOCO-TIMEPAY.ipa Payload sidestore-entitlements
          ls -la NOCO-TIMEPAY.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          retention-days: 7

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NOCO-TIMEPAY-ipa
          path: build/NOCO-TIMEPAY.ipa
          retention-days: 90
